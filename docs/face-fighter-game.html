<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FACE FIGHTER — Vòng 1</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  :root{
    --red:#e3342f; --yellow:#ffcc1d; --blue:#1f7ae0; --ink:#1a1208;
    --hp:#46d11f; --hp2:#d11f1f;
  }
  *{box-sizing:border-box; margin:0; padding:0; user-select:none; -webkit-user-select:none;}
  html,body{height:100%; overflow:hidden;}
  body{
    font-family:"Arial Black", Impact, "Segoe UI", sans-serif;
    background:#2a1c0e;
  }
  #game{position:fixed; inset:0;}
  #gl{position:absolute; inset:0; width:100%; height:100%; display:block; touch-action:none;}

  /* ---- HUD ---- */
  #hud{position:absolute; top:0; left:0; right:0; padding:10px 12px; pointer-events:none;}
  .hp-row{display:flex; align-items:center; gap:10px; max-width:560px; margin:0 auto;}
  #portrait{
    width:58px; height:58px; border-radius:10px; border:4px solid var(--yellow);
    background:#000 center/cover no-repeat; box-shadow:0 4px 0 rgba(0,0,0,.5);
    flex:none; transform:rotate(-3deg);
  }
  .hp-shell{flex:1;}
  .hp-name{
    color:#fff; font-size:14px; letter-spacing:1px; text-shadow:2px 2px 0 #000;
    margin-bottom:4px; transform:rotate(-1deg);
  }
  .hp-bar{
    height:26px; background:#3a2a14; border:4px solid #000; border-radius:8px;
    overflow:hidden; box-shadow:0 4px 0 rgba(0,0,0,.5), inset 0 3px 0 rgba(255,255,255,.15);
  }
  #hpFill{
    height:100%; width:100%;
    background:linear-gradient(180deg,#7dff4d,var(--hp) 55%, #2f9e0e);
    transition:width .18s cubic-bezier(.2,1.4,.4,1); border-right:3px solid rgba(0,0,0,.35);
  }
  #round{
    text-align:center; color:var(--yellow); font-size:15px; letter-spacing:3px;
    text-shadow:2px 2px 0 #000; margin-top:6px;
  }

  /* ---- big splash text (FIGHT!, K.O.!) ---- */
  #splash{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    pointer-events:none; z-index:30;
  }
  #splash span{
    font-size:clamp(64px,18vw,150px); color:var(--yellow); -webkit-text-stroke:6px #000;
    text-shadow:0 10px 0 rgba(0,0,0,.45); transform:scale(0); letter-spacing:2px;
  }
  #splash.show span{animation:pop .55s cubic-bezier(.2,2.2,.3,1) forwards;}
  @keyframes pop{to{transform:scale(1) rotate(-4deg);}}

  /* ---- comic hit bursts ---- */
  .pow{
    position:absolute; z-index:25; pointer-events:none;
    font-size:46px; color:#fff; -webkit-text-stroke:4px #000;
    text-shadow:0 6px 0 rgba(0,0,0,.4);
    animation:powAnim .5s ease-out forwards;
  }
  @keyframes powAnim{
    0%{transform:scale(.2) rotate(var(--r)); opacity:1;}
    60%{transform:scale(1.15) rotate(var(--r)); opacity:1;}
    100%{transform:scale(1.3) rotate(var(--r)) translateY(-30px); opacity:0;}
  }

  /* ---- punch buttons ---- */
  #btns{
    position:absolute; bottom:14px; left:0; right:0; display:flex;
    justify-content:space-between; padding:0 18px; z-index:20;
  }
  .punch{
    width:92px; height:92px; border-radius:50%; border:5px solid #000;
    background:radial-gradient(circle at 32% 28%, #ff7a6b, var(--red) 60%, #8f1410);
    color:#fff; font-family:inherit; font-size:15px; letter-spacing:1px;
    box-shadow:0 7px 0 #000, inset 0 4px 0 rgba(255,255,255,.35);
    cursor:pointer; transition:transform .07s;
    -webkit-text-stroke:1px #000; text-shadow:1px 2px 0 #000;
  }
  .punch:active{transform:translateY(5px); box-shadow:0 2px 0 #000;}

  /* ---- KO overlay ---- */
  #koPanel{
    position:absolute; inset:0; display:none; flex-direction:column; gap:18px;
    align-items:center; justify-content:center; z-index:40;
    background:rgba(20,10,0,.55);
  }
  #koPanel.show{display:flex;}
  #koPanel h2{
    font-size:clamp(60px,16vw,130px); color:var(--red); -webkit-text-stroke:6px #000;
    text-shadow:0 10px 0 rgba(0,0,0,.5); transform:rotate(-5deg);
    animation:pop .5s cubic-bezier(.2,2.2,.3,1);
  }
  #rematch{
    font-family:inherit; font-size:20px; padding:14px 34px; border-radius:14px;
    border:5px solid #000; background:linear-gradient(180deg,#ffe263,var(--yellow));
    box-shadow:0 6px 0 #000; cursor:pointer; letter-spacing:1px; color:#000;
  }
  #rematch:active{transform:translateY(4px); box-shadow:0 2px 0 #000;}
  #hint{
    position:absolute; bottom:118px; width:100%; text-align:center; z-index:15;
    color:#fff; font-size:13px; text-shadow:1px 1px 0 #000; letter-spacing:1px;
    font-family:"Segoe UI",sans-serif; opacity:.85; pointer-events:none;
  }
  #flash{position:absolute; inset:0; background:#fff; opacity:0; pointer-events:none; z-index:18;}
</style>
</head>
<body>
<div id="game">
  <canvas id="gl"></canvas>

  <div id="hud">
    <div class="hp-row">
      <div id="portrait"></div>
      <div class="hp-shell">
        <div class="hp-name">ĐỐI THỦ</div>
        <div class="hp-bar"><div id="hpFill"></div></div>
      </div>
    </div>
    <div id="round">ROUND 1</div>
  </div>

  <div id="splash"><span>FIGHT!</span></div>
  <div id="flash"></div>
  <div id="hint">Bấm nửa trái / phải màn hình hoặc 2 nút găng để đấm 👊</div>

  <div id="btns">
    <button class="punch" id="pl">ĐẤM<br>TRÁI</button>
    <button class="punch" id="pr">ĐẤM<br>PHẢI</button>
  </div>

  <div id="koPanel">
    <h2>K.O.!</h2>
    <button id="rematch">🥊 ĐẤU LẠI</button>
  </div>
</div>

// ================= OPPONENT (your face!) =================
function depthAt(u,v){
  const g=(x,y,cx,cy,sx,sy)=>Math.exp(-(((x-cx)/sx)**2+((y-cy)/sy)**2));
  let z=Math.sqrt(Math.max(0,1-(u/1.05)**2-(v/1.12)**2))*0.85;
  z+=0.34*g(u,v,0,0.12,0.16,0.34); z+=0.16*g(u,v,0,0.30,0.20,0.10);
  z+=0.10*g(u,v,0,-0.28,0.55,0.16);
  z-=0.07*(g(u,v,-0.32,-0.18,0.16,0.09)+g(u,v,0.32,-0.18,0.16,0.09));
  z+=0.10*(g(u,v,-0.42,0.30,0.22,0.22)+g(u,v,0.42,0.30,0.22,0.22));
  z+=0.12*g(u,v,0,0.80,0.22,0.18); z+=0.06*g(u,v,0,0.55,0.30,0.12);
  return z;
}
const fighter = new THREE.Group();      // whole body (sways)
const headPivot = new THREE.Group();    // head reacts to punches
let headBuilt=false;

const faceImg = new Image();
faceImg.onload = ()=>{
  const tex = new THREE.CanvasTexture(faceImg);
  tex.minFilter = THREE.LinearFilter;
  // face mesh
  const geo = new THREE.PlaneGeometry(1.5,1.9,80,80);
  const p = geo.attributes.position;
  for(let i=0;i<p.count;i++){
    const u=p.getX(i)/0.75, v=-p.getY(i)/0.95;
    const wrap=Math.pow(Math.min(1,Math.abs(u)),3)*0.34;
    p.setZ(i,(depthAt(u,v)-wrap)*0.62);
  }
  geo.computeVertexNormals();
  const face = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({map:tex,roughness:.75}));
  face.position.z=0.12;
  const skull = new THREE.Mesh(new THREE.SphereGeometry(.8,32,24),
    new THREE.MeshStandardMaterial({color:0x46362c,roughness:.9}));
  skull.scale.set(1,1.26,.92); skull.position.set(0,.04,-.18);
  headPivot.add(skull, face);
  headBuilt=true;
};
faceImg.src = FACE;
headPivot.position.set(0, 2.25, 0);
fighter.add(headPivot);

{

const myGloves=[];
{
  const red=new THREE.MeshStandardMaterial({color:0xe3342f,roughness:.4});
  const cuff=new THREE.MeshStandardMaterial({color:0xffffff,roughness:.6});
  [-1,1].forEach(s=>{

// ================= GAME STATE =================
let hp=100, ko=false, started=false;
let headVel={x:0,y:0,z:0}, squash=0, shake=0, dizzy=0;
const hpFill=document.getElementById('hpFill');
const splash=document.getElementById('splash');
const flash=document.getElementById('flash');
const WORDS=['POW!','BAM!','BỐP!','OÁCH!','CHÁT!','BÙM!'];

function showSplash(txt){
  splash.querySelector('span').textContent=txt;
  splash.classList.remove('show'); void splash.offsetWidth;
  splash.classList.add('show');
}
setTimeout(()=>{showSplash('FIGHT!'); started=true;}, 600);

function punch(side){ // side: -1 left, 1 right
  if(ko||!started) return;
  const g=myGloves[side<0?0:1];
  if(g.userData.active) return;
  g.userData.active=true; g.userData.t=0;
}
function landHit(side){
  if(ko) return;
  hp=Math.max(0,hp-(7+Math.random()*6));
  hpFill.style.width=hp+'%';
  if(hp<40) hpFill.style.background='linear-gradient(180deg,#ff9d4d,#e07a1f 55%,#9e520e)';
  if(hp<18) hpFill.style.background='linear-gradient(180deg,#ff6b5e,#d11f1f 55%,#8a0e0e)';
  headVel.y += .5+Math.random()*.3;
  headVel.x += -side*(.8+Math.random()*.5);
  headVel.z += .35;
  squash=1; shake=1; dizzy=Math.min(1, dizzy+ (hp<35?.6:.25));
  flash.style.opacity=.55; setTimeout(()=>flash.style.opacity=0,60);
  // comic word
  const w=document.createElement('div'); w.className='pow';
  w.textContent=WORDS[Math.random()*WORDS.length|0];
  w.style.setProperty('--r',(Math.random()*30-15)+'deg');
  w.style.left=(innerWidth/2 + (Math.random()*120-60) + side*60)+'px';
  w.style.top =(innerHeight*0.32 + (Math.random()*60-30))+'px';
  document.body.appendChild(w); setTimeout(()=>w.remove(),520);
  if(navigator.vibrate) navigator.vibrate(35);
  if(hp<=0) doKO();
}
function doKO(){
  ko=true; dizzy=1;
  showSplash('K.O.!');
  setTimeout(()=>document.getElementById('koPanel').classList.add('show'), 900);
}
document.getElementById('rematch').onclick=()=>{
  hp=100; ko=false; dizzy=0;
  hpFill.style.width='100%';
  hpFill.style.background='linear-gradient(180deg,#7dff4d,#46d11f 55%,#2f9e0e)';
  fighter.rotation.set(0,0,0); fighter.position.y=-0.55;
  document.getElementById('koPanel').classList.remove('show');
  showSplash('ROUND 2!');
};

// input: buttons + screen halves + keyboard
document.getElementById('pl').addEventListener('pointerdown',e=>{e.stopPropagation();punch(-1);});
document.getElementById('pr').addEventListener('pointerdown',e=>{e.stopPropagation();punch(1);});
canvas.addEventListener('pointerdown',e=>punch(e.clientX<innerWidth/2?-1:1));
addEventListener('keydown',e=>{
  if(e.key==='a'||e.key==='ArrowLeft') punch(-1);
  if(e.key==='l'||e.key==='ArrowRight') punch(1);
});

// ================= LOOP =================
const clock=new THREE.Clock();
function resize(){
  const w=innerWidth,h=innerHeight;
  renderer.setSize(w,h,false);
  camera.aspect=w/h; camera.updateProjectionMatrix();
}
addEventListener('resize',resize); resize();

function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),.05), t=clock.elapsedTime;

  // idle sway / bob
  if(!ko){
    fighter.rotation.y = Math.sin(t*1.1)*.12;
    fighter.position.x = Math.sin(t*.8)*.25;
    fighter.position.y = -0.55 + Math.abs(Math.sin(t*3))*.05;
  }else{
    // tip over
    fighter.rotation.x = Math.min(Math.PI/2.2, fighter.rotation.x + dt*2.2);
    fighter.position.y = Math.max(-1.05, fighter.position.y - dt*.8);
  }

  // head spring physics
  if(headBuilt){
    const k=14, d=6;
    ['x','y','z'].forEach(ax=>{
      const cur=headPivot.rotation[ax]||0;
    });
    headPivot.rotation.x += (headVel.y*0 - headPivot.rotation.x)*dt*8;
    headPivot.rotation.z += (-headVel.x*.6 - headPivot.rotation.z)*dt*10;
    headPivot.rotation.y += ( headVel.x*.9 - headPivot.rotation.y)*dt*10;
    headPivot.position.z = headVel.z*-.3;
    headVel.x*= (1-dt*5); headVel.y*=(1-dt*5); headVel.z*=(1-dt*6);
    squash=Math.max(0,squash-dt*4);
    const s=1-squash*.25;
    headPivot.scale.set(1+squash*.18, s, 1+squash*.18);
    if(ko) headPivot.rotation.y += dt*3; // spin when KO'd
  }

  // dizzy stars
  dizzy=Math.max(0,dizzy-dt*(ko?0:.15));
  stars.forEach((sp,i)=>{
    sp.visible = dizzy>0.2;
    const a=t*4+i*2.1;
    sp.position.set(Math.cos(a)*.95, .95+Math.sin(t*6+i)*.07, Math.sin(a)*.6);
  });

  // player glove punches
  myGloves.forEach(g=>{
    const u=g.userData;
    if(u.active){
      u.t+=dt*4.2;
      const headWorld=new THREE.Vector3();
      headPivot.getWorldPosition(headWorld);
      const target=headWorld.clone(); target.z+=.7; target.x+=u.side*.15;
      if(u.t<1){ // forward
        g.position.lerpVectors(u.rest,target,THREE.MathUtils.smoothstep(u.t,0,1));
        if(u.t>=.92 && !u.hit){u.hit=true; landHit(u.side);}
      }else if(u.t<2){ // back
        g.position.lerpVectors(target,u.rest,THREE.MathUtils.smoothstep(u.t-1,0,1));
      }else{u.active=false; u.hit=false; g.position.copy(u.rest);}
    }else{
      // idle bob
      g.position.y=u.rest.y+Math.sin(t*3+u.side)*.06;
    }
  });

  // screen shake
  shake=Math.max(0,shake-dt*4);
  camera.position.x = (Math.random()-.5)*shake*.15;
  camera.position.y = 1.55+(Math.random()-.5)*shake*.15;

  renderer.render(scene,camera);
}
animate();
